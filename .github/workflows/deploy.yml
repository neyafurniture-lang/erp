name: Deploy NEYA ERP

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: neya-erp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déployer sur le VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/neya-erp' }}
            git fetch origin
            ./deploy/check-update.sh || true
            ./deploy/deploy.sh
            echo "--- Version déployée ---"
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend node -e "fetch('http://localhost:4000/health').then(r=>r.text()).then(console.log)" || true
